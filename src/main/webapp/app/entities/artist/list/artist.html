<div>
  <jhi-alert-error />
  <jhi-alert />

  <div class="entity-list-hero">
    <div class="entity-list-hero-icon" style="background: linear-gradient(135deg, #e7611a, #f59b23)">
      <fa-icon icon="guitar" />
    </div>
    <div class="entity-list-hero-info">
      <span class="entity-list-hero-type">Música</span>
      <h1>Artistas</h1>
      <span class="entity-list-hero-count">{{ artists().length }} artistas</span>
    </div>
  </div>
  <div class="entity-list-actions">
    <button class="btn-icon-action" (click)="load()" [disabled]="isLoading()" title="Actualizar" aria-label="Actualizar">
      <fa-icon icon="sync" [animation]="isLoading() ? 'spin' : undefined" />
    </button>
    <a class="btn-icon-action" routerLink="/artist/new" title="Nuevo artista" aria-label="Nuevo artista">
      <fa-icon icon="plus" />
    </a>
  </div>

  @if (artists().length === 0) {
    <div class="entity-list-empty">
      <fa-icon icon="guitar" class="entity-list-empty-icon" />
      <p>No hay artistas disponibles</p>
    </div>
  } @else {
    <div class="artist-grid" id="entities">
      @for (artist of artists(); track trackId(artist)) {
        <div class="artist-card" ngbDropdown data-cy="entityTable">
          <div class="artist-avatar">
            <fa-icon icon="user" />
          </div>

          <a [routerLink]="['/artist', artist.id, 'view']" class="artist-name" style="text-decoration: none">
            {{ artist.name }}
          </a>
          @if (artist.country) {
            <span class="artist-country">{{ artist.country }}</span>
          }
          @if (artist.verified) {
            <div class="artist-verified">
              <fa-icon icon="check" />
              <span>Verificado</span>
            </div>
          }

          <button class="artist-card-more" ngbDropdownToggle [id]="'artist-actions-' + artist.id" aria-label="Más opciones">•••</button>
          <ul ngbDropdownMenu [attr.aria-labelledby]="'artist-actions-' + artist.id">
            <li>
              <a class="dropdown-item" [routerLink]="['/artist', artist.id, 'view']"> <fa-icon icon="eye" [fixedWidth]="true" /> Ver </a>
            </li>
            <li>
              <a class="dropdown-item" [routerLink]="['/artist', artist.id, 'edit']">
                <fa-icon icon="pencil-alt" [fixedWidth]="true" /> Editar
              </a>
            </li>
            <li>
              <button class="dropdown-item text-danger" (click)="delete(artist)">
                <fa-icon icon="times" [fixedWidth]="true" /> Eliminar
              </button>
            </li>
          </ul>
        </div>
      }
    </div>

    <div class="entity-list-pagination">
      <jhi-item-count [params]="{ page: page(), totalItems: totalItems(), itemsPerPage: itemsPerPage() }" />
      <ngb-pagination
        [collectionSize]="totalItems()"
        [page]="page()"
        [pageSize]="itemsPerPage()"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="navigateToPage($event)"
      />
    </div>
  }
</div>
