<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (genre(); as genreRef) {
      <div>
        <h2 data-cy="genreDetailsHeading"><span jhiTranslate="musicPlayerApp.genre.detail.title">Genre</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ genreRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.genre.name">Name</span></dt>
          <dd>
            <span>{{ genreRef.name }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/genre', genreRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
