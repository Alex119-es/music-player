<div>
  <jhi-alert-error />
  <jhi-alert />

  <!-- Hero header -->
  <div class="entity-list-hero">
    <div class="entity-list-hero-icon" style="background: linear-gradient(135deg, #8d67ab, #6c4a8a)">
      <fa-icon icon="fire" />
    </div>
    <div class="entity-list-hero-info">
      <span class="entity-list-hero-type">Categorías</span>
      <h1>Géneros</h1>
      <span class="entity-list-hero-count">{{ genres().length }} géneros</span>
    </div>
  </div>
  <div class="entity-list-actions">
    <button class="btn-icon-action" (click)="load()" [disabled]="isLoading()" title="Actualizar" aria-label="Actualizar">
      <fa-icon icon="sync" [animation]="isLoading() ? 'spin' : undefined" />
    </button>
    <a class="btn-icon-action" routerLink="/genre/new" title="Nuevo género" aria-label="Nuevo género">
      <fa-icon icon="plus" />
    </a>
  </div>

  @if (genres().length === 0) {
    <div class="entity-list-empty">
      <fa-icon icon="fire" class="entity-list-empty-icon" />
      <p>No hay géneros disponibles</p>
    </div>
  } @else {
    <div class="genre-grid" id="entities">
      @for (genre of genres(); track trackId(genre); let i = $index) {
        <div class="genre-card genre-card-color-{{ i % 10 }}" ngbDropdown>
          <a [routerLink]="['/genre', genre.id, 'view']" class="genre-card-link">
            <h3 class="genre-card-name">{{ genre.name }}</h3>
            <fa-icon icon="music" class="genre-card-icon" />
          </a>
          <button class="genre-card-more" ngbDropdownToggle [id]="'genre-actions-' + genre.id" aria-label="Más opciones">•••</button>
          <ul ngbDropdownMenu [attr.aria-labelledby]="'genre-actions-' + genre.id">
            <li>
              <a class="dropdown-item" [routerLink]="['/genre', genre.id, 'view']"> <fa-icon icon="eye" [fixedWidth]="true" /> Ver </a>
            </li>
            <li>
              <a class="dropdown-item" [routerLink]="['/genre', genre.id, 'edit']">
                <fa-icon icon="pencil-alt" [fixedWidth]="true" /> Editar
              </a>
            </li>
            <li>
              <button class="dropdown-item text-danger" (click)="delete(genre)">
                <fa-icon icon="times" [fixedWidth]="true" /> Eliminar
              </button>
            </li>
          </ul>
        </div>
      }
    </div>
  }
</div>
