<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (like(); as likeRef) {
      <div>
        <h2 data-cy="likeDetailsHeading"><span jhiTranslate="musicPlayerApp.like.detail.title">Like</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ likeRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.like.createdAt">Created At</span></dt>
          <dd>
            <span>{{ likeRef.createdAt | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.like.user">User</span></dt>
          <dd>
            <span>{{ likeRef.user?.id }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.like.song">Song</span></dt>
          <dd>
            @if (like()!.song) {
              <div>
                <a [routerLink]="['/song', like()!.song?.id, 'view']">{{ likeRef.song?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/like', likeRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
