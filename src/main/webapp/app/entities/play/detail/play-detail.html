<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (play(); as playRef) {
      <div>
        <h2 data-cy="playDetailsHeading"><span jhiTranslate="musicPlayerApp.play.detail.title">Play</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ playRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.play.playedAt">Played At</span></dt>
          <dd>
            <span>{{ playRef.playedAt | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.play.durationListened">Duration Listened</span></dt>
          <dd>
            <span>{{ playRef.durationListened }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.play.user">User</span></dt>
          <dd>
            <span>{{ playRef.user?.id }}</span>
          </dd>
          <dt><span jhiTranslate="musicPlayerApp.play.song">Song</span></dt>
          <dd>
            @if (play()!.song) {
              <div>
                <a [routerLink]="['/song', play()!.song?.id, 'view']">{{ playRef.song?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/play', playRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
