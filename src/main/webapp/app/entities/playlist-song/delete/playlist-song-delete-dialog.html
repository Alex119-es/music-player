@if (playlistSong) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(playlistSong.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="playlistSongDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirmar operación de borrado
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-playlistSong-heading"
        jhiTranslate="musicPlayerApp.playlistSong.delete.question"
        [translateValues]="{ id: playlistSong.id }"
      >
        ¿Seguro que quiere eliminar Playlist Song {{ playlistSong.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-playlistSong" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
