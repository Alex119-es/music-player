<div class="login-page">
  <div class="login-wrapper">
    <h1 class="login-title" data-cy="loginTitle" jhiTranslate="login.title">Iniciar sesión</h1>

    <div class="login-card">
      <div class="login-brand">
        <fa-icon icon="music" class="login-brand-icon" />
        <span class="login-brand-name">Streamify</span>
      </div>

      @if (authenticationError()) {
        <div class="alert alert-danger" data-cy="loginError" jhiTranslate="login.messages.error.authentication">
          <strong>¡El inicio de sesión ha fallado!</strong> Por favor, revise las credenciales e intente de nuevo.
        </div>
      }

      <form class="login-form" (ngSubmit)="login()" [formGroup]="loginForm">
        <div class="login-field">
          <label class="login-label" for="username" jhiTranslate="global.form.username.label">Usuario</label>
          <input
            #username
            type="text"
            class="form-control login-input"
            name="username"
            id="username"
            placeholder="{{ 'global.form.username.placeholder' | translate }}"
            formControlName="username"
            data-cy="username"
            autocomplete="username"
          />
        </div>

        <div class="login-field">
          <label class="login-label" for="password" jhiTranslate="login.form.password">Contraseña</label>
          <input
            type="password"
            class="form-control login-input"
            name="password"
            id="password"
            placeholder="{{ 'login.form.password.placeholder' | translate }}"
            formControlName="password"
            data-cy="password"
            autocomplete="current-password"
          />
        </div>

        <div class="login-remember">
          <label class="login-remember-label" for="rememberMe">
            <input class="login-remember-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
            <span jhiTranslate="login.form.rememberme">Iniciar la sesión automáticamente</span>
          </label>
        </div>

        <button type="submit" class="login-submit" data-cy="submit" jhiTranslate="login.form.button">Iniciar sesión</button>
      </form>

      <div class="login-links">
        <a routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector" jhiTranslate="login.password.forgot"
          >¿Ha olvidado su contraseña?</a
        >
      </div>

      <div class="login-divider"></div>

      <div class="login-register">
        <span jhiTranslate="global.messages.info.register.noaccount">¿Aún no tienes una cuenta?</span>
        <a routerLink="/account/register" jhiTranslate="global.messages.info.register.link">Crea una cuenta</a>
      </div>
    </div>
  </div>
</div>
